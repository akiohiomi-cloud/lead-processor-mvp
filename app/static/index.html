<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lead MVP — Залишити заявку</title>
<style>
  :root {
    --bg: #0B0B0D;
    --accent: #7C5CFF;
    --accent-hover: #9379ff;
    --text: #F2F2F5;
    --muted: #8B8B95;
    --border: rgba(255,255,255,0.08);
    --card-bg: rgba(255,255,255,0.025);
    --field-bg: rgba(255,255,255,0.04);
    --error: #FF6B6B;
    --success: #4ADE80;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background:
      radial-gradient(circle at 20% 10%, rgba(124,92,255,0.10), transparent 45%),
      radial-gradient(circle at 80% 90%, rgba(124,92,255,0.07), transparent 45%),
      var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
  }
  .card {
    width: 100%;
    max-width: 480px;
    padding: 40px 36px;
    background: var(--card-bg);
    backdrop-filter: blur(20px) saturate(140%);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    border: 1px solid var(--border);
    border-radius: 20px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.5);
    opacity: 0;
    transform: translateY(16px);
    animation: appear 700ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }
  @keyframes appear { to { opacity: 1; transform: translateY(0); } }
  h1 {
    margin: 0 0 12px;
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1.2;
  }
  .accent { color: var(--accent); }
  .sub {
    margin: 0 0 32px;
    color: var(--muted);
    font-size: 15px;
    line-height: 1.5;
  }
  form { display: flex; flex-direction: column; gap: 14px; }
  label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 500;
  }
  input, textarea {
    width: 100%;
    padding: 12px 14px;
    background: var(--field-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: inherit;
    font-size: 15px;
    transition: border-color 150ms ease, background 150ms ease;
    outline: none;
  }
  textarea { min-height: 90px; resize: vertical; }
  input::placeholder, textarea::placeholder { color: rgba(139,139,149,0.6); }
  input:focus, textarea:focus {
    border-color: var(--accent);
    background: rgba(124,92,255,0.06);
  }
  button {
    margin-top: 10px;
    padding: 14px 20px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 150ms ease, transform 100ms ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  button:hover:not(:disabled) { background: var(--accent-hover); }
  button:active:not(:disabled) { transform: translateY(1px); }
  button:disabled { opacity: 0.7; cursor: wait; }
  .spinner {
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 700ms linear infinite;
    display: none;
  }
  button.loading .spinner { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status {
    margin-top: 16px;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 14px;
    display: none;
    line-height: 1.4;
  }
  .status.show { display: block; }
  .status.success {
    background: rgba(74,222,128,0.10);
    border: 1px solid rgba(74,222,128,0.30);
    color: var(--success);
  }
  .status.error {
    background: rgba(255,107,107,0.10);
    border: 1px solid rgba(255,107,107,0.30);
    color: var(--error);
  }
  @media (max-width: 540px) {
    .card { padding: 28px 22px; border-radius: 16px; }
    h1 { font-size: 24px; }
    .sub { margin-bottom: 24px; font-size: 14px; }
  }
</style>
</head>
<body>
  <main class="card">
    <h1>Впровадимо <span class="accent">CRM</span> під ваш відділ продажів</h1>
    <p class="sub">Залиште заявку — дізнаємось потреби, прорахуємо бюджет і запропонуємо рішення під ключ. Відповідаємо протягом дня.</p>
    <form id="lead-form" novalidate>
      <div>
        <label for="name">Ім'я</label>
        <input id="name" name="name" type="text" required autocomplete="name" placeholder="Як до вас звертатись">
      </div>
      <div>
        <label for="phone">Телефон</label>
        <input id="phone" name="phone" type="tel" required autocomplete="tel" placeholder="+380">
      </div>
      <div>
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required autocomplete="email" placeholder="you@company.com">
      </div>
      <div>
        <label for="message">Коротко про задачу</label>
        <textarea id="message" name="message" placeholder="Кількість користувачів, бюджет, терміни"></textarea>
      </div>
      <button id="submit-btn" type="submit">
        <span class="spinner"></span>
        <span class="label">Залишити заявку</span>
      </button>
      <div id="status" class="status" role="status" aria-live="polite"></div>
    </form>
  </main>

<script>
(function () {
  const form = document.getElementById('lead-form');
  const btn = document.getElementById('submit-btn');
  const btnLabel = btn.querySelector('.label');
  const status = document.getElementById('status');

  function setStatus(kind, text) {
    status.className = 'status show ' + kind;
    status.textContent = text;
  }
  function clearStatus() {
    status.className = 'status';
    status.textContent = '';
  }

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    if (btn.disabled) return;

    clearStatus();
    btn.disabled = true;
    btn.classList.add('loading');
    btnLabel.textContent = 'Надсилаємо…';

    const message = form.message.value.trim();
    const payload = {
      name: form.name.value.trim(),
      phone: form.phone.value.trim(),
      email: form.email.value.trim(),
      message: message || null,
      source: 'landing-form'
    };

    try {
      const r = await fetch('/lead', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (r.status === 202) {
        setStatus('success', '✓ Заявку прийнято, ми звʼяжемось');
        form.reset();
      } else {
        setStatus('error', 'Перевірте, будь ласка, дані форми');
      }
    } catch (err) {
      setStatus('error', 'Сталася помилка, спробуйте ще');
    } finally {
      btn.disabled = false;
      btn.classList.remove('loading');
      btnLabel.textContent = 'Залишити заявку';
    }
  });
})();
</script>
</body>
</html>
